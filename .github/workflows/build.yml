on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false
  workflow_run:
    workflows:
      - Benchmark
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main') }}

name: Build

jobs:
  syntactic-check:
    if: ${{ github.event_name != 'workflow_run' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: agda-synthetic-categories
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Enable tmate debugging of manually-triggered workflows if the input option was provided
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

      # Check the validity of the forester code, and check for duplicate trees
      - name: Check forest
        run: nix-shell --run "make check-forest-no-typecheck"

  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: agda-synthetic-categories
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Enable tmate debugging of manually-triggered workflows if the input option was provided
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

      - name: Build
        run: nix-build

      - name: Stage site artifact
        if: >-
          (github.event_name == 'push' && github.ref_name == 'main') ||
          (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
          (github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main')
        run: cp -LR result site-artifact

      - name: Prepare benchmark page data
        if: >-
          (github.event_name == 'push' && github.ref_name == 'main') ||
          (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
          (github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main')
        run: |
          mkdir -p site-artifact/benchmarks
          git fetch origin benchmark-data || true
          if git show-ref --verify --quiet refs/remotes/origin/benchmark-data; then
            git show origin/benchmark-data:data.json > site-artifact/benchmarks/data.json
          fi
          test -f site-artifact/benchmarks/data.json
          printf 'window.BENCHMARK_DATA = ' > site-artifact/benchmarks/data.js
          cat site-artifact/benchmarks/data.json >> site-artifact/benchmarks/data.js

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        if: >-
          (github.event_name == 'push' && github.ref_name == 'main') ||
          (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
          (github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main')
        with:
          path: site-artifact/
          retention-days: 1

  deploy:
    # Add a dependency to the build job
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
