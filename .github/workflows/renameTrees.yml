name: rename-trees

on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        description: 'Should this be a dry-run?'
        required: false
        default: true

      prefix:
        type: string
        description: 'Prefix of trees to rename'
        required: true
        default: 'tot'

      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        default: false

      pr_number:
        type: string
        descriptioin: The associated pr to comment on
        required: true

jobs:
  Rename:
    runs-on: ubuntu-latest
    permissions:
     issues: write
     pull-requests: write
     contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: agda-synthetic-categories
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Enable tmate debugging of manually-triggered workflows if the input option was provided
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}

      - uses: rrbutani/use-nix-shell-action@v1
        with:
          file: ./shell.nix

      - name: Copy literate Agda trees
        run: make sync-forest-src

      - name: Dry run the renamer
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "Output from renameTrees dry run:" > renameResult
          echo '```' >> renameResult
          python ./scripts/rename_trees.py --dry-run '${{ inputs.prefix }}' src/ trees/ >> renameResult
          echo '```' >> renameResult

      - name: Comment dry-run result
        uses: peter-evans/create-or-update-comment@v5
        if: ${{ inputs.dry_run == true }}
        with:
          issue-number: ${{ inputs.pr_number }}
          repository: 'samtoth/agda-synthetic-categories'
          body-path: renameResult
        

      - name: Run the renamer
        if: ${{ inputs.dry_run == false }}
        run: |
          echo "Automatically renames trees" > message
          echo '' >> message
          python ./scripts/rename_trees.py '${{ inputs.prefix }}' src/ trees/ >> message

      - name: setup git
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: stage changed files
        if: ${{ inputs.dry_run == false }}
        run: git add . ':!message'

      - name: commit changed files
        if: ${{ inputs.dry_run == false }}
        run: git commit -F message

      - name: fetch
        if: ${{ inputs.dry_run == false }}
        run: git fetch origin ${{github.ref_name}}

      - name: push code to branch
        if: ${{ inputs.dry_run == false }}
        run: git push origin HEAD:${{github.ref_name}}
